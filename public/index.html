<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>维修管理平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background-color: #f5f7fa;
      padding: 20px;
    }
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .login-title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #303133;
    }
    .form-item {
      margin-bottom: 20px;
    }
    .form-item label {
      display: block;
      margin-bottom: 8px;
      color: #606266;
    }
    .form-item input, .form-item select {
      width: 100%;
      height: 40px;
      padding: 0 15px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      height: 40px;
      background-color: #409eff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #66b1ff;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #ebeef5;
    }
    .header-title {
      font-size: 22px;
      font-weight: bold;
      color: #303133;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logout-btn {
      padding: 6px 12px;
      background-color: #f56c6c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #ebeef5;
      padding-bottom: 10px;
      flex-wrap: wrap;
    }
    .tab-item {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      color: #606266;
      user-select: none;
    }
    .tab-item.active {
      background-color: #409eff;
      color: #fff;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .table-container {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    table th, table td {
      border: 1px solid #ebeef5;
      padding: 12px;
      text-align: left;
      font-size: 14px;
      word-break: keep-all;
    }
    table th {
      background-color: #f5f7fa;
      font-weight: bold;
      color: #303133;
    }
    .operate-btn {
      padding: 4px 8px;
      margin-right: 5px;
      margin-bottom: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
    }
    .edit-btn {
      background-color: #409eff;
    }
    .check-btn {
      background-color: #67c23a;
    }
    .delete-btn {
      background-color: #f56c6c;
    }
    .add-btn {
      padding: 8px 16px;
      background-color: #67c23a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .confirm-btn {
      background-color: #409eff;
      color: #fff;
    }
    .cancel-btn {
      background-color: #909399;
      color: #fff;
    }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255,255,255,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 16px;
      color: #409eff;
    }
  </style>
</head>
<body>
  <!-- 加载提示 -->
  <div class="loading" id="loading" style="display: none;">数据同步中，请稍候...</div>

  <!-- 登录页面 -->
  <div class="login-container" id="loginBox">
    <div class="login-title">维修管理平台登录</div>
    <div class="form-item">
      <label>登录角色</label>
      <select id="roleSelect">
        <option value="admin">管理员登录</option>
        <option value="worker">维修人员登录</option>
      </select>
    </div>
    <div class="form-item">
      <label>账号</label>
      <input type="text" id="username" placeholder="请输入账号">
    </div>
    <div class="form-item">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="btn" id="loginBtn">登录</button>
  </div>

  <!-- 主平台页面 -->
  <div class="container" id="mainBox">
    <div class="header">
      <div class="header-title">维修管理平台</div>
      <div class="user-info">
        <span>当前用户：<span id="currentUser"></span></span>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>
    </div>

    <div class="tab-container">
      <div class="tab-item active" data-tab="order">派工管理</div>
      <div class="tab-item" data-tab="check">审核管理</div>
      <div class="tab-item" data-tab="export">数据导出</div>
    </div>

    <!-- 派工管理tab -->
    <div class="tab-content active" id="orderTab">
      <button class="add-btn" id="addOrderBtn">新增派工单</button>
      <div class="table-container">
        <table id="orderTable">
          <thead>
            <tr>
              <th>工单编号</th>
              <th>报修地址</th>
              <th>报修内容</th>
              <th>维修人员</th>
              <th>工单状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="orderTableBody">
            <!-- 工单数据动态渲染 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 审核管理tab -->
    <div class="tab-content" id="checkTab">
      <div class="table-container">
        <table id="checkTable">
          <thead>
            <tr>
              <th>工单编号</th>
              <th>报修地址</th>
              <th>维修内容</th>
              <th>验收结果</th>
              <th>审核状态</th>
              <th>提交时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="checkTableBody">
            <!-- 审核数据动态渲染 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 数据导出tab -->
    <div class="tab-content" id="exportTab">
      <button class="btn" id="exportExcelBtn" style="width: auto; margin-bottom: 20px;">导出全部工单数据</button>
      <div>
        <p>数据说明：导出当前云端全量共用数据，包含所有派工单、审核记录、附件信息</p>
      </div>
    </div>
  </div>

  <!-- 新增/编辑工单弹窗 -->
  <div class="modal" id="orderModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">新增派工单</div>
      <div class="form-item">
        <label>报修地址</label>
        <input type="text" id="address" placeholder="请输入报修地址">
      </div>
      <div class="form-item">
        <label>报修内容</label>
        <input type="text" id="content" placeholder="请输入报修内容">
      </div>
      <div class="form-item">
        <label>指派维修人员</label>
        <input type="text" id="worker" placeholder="请输入维修人员姓名">
      </div>
      <div class="form-item">
        <label>现场照片</label>
        <input type="file" id="photoFile" multiple accept="image/*">
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel-btn" id="cancelModalBtn">取消</button>
        <button class="modal-btn confirm-btn" id="confirmOrderBtn">确认提交</button>
      </div>
    </div>
  </div>

  <script>
    // 全局变量（所有数据从云端拉取，无任何本地存储）
    let globalData = {};
    let currentLoginUser = null;
    let editOrderId = null;

    // 页面加载时，先拉取云端全量数据
    window.onload = async function() {
      await loadGlobalData();
      bindEvent();
    }

    // 【核心函数1】从云端拉取全量共用数据
    async function loadGlobalData() {
      showLoading(true);
      try {
        const res = await fetch('/api/data', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        const result = await res.json();
        if (result.code === 200) {
          globalData = result.data;
          console.log('云端数据拉取成功', globalData);
        } else {
          alert('数据拉取失败：' + result.msg);
        }
      } catch (error) {
        console.error('拉取数据错误', error);
        alert('网络错误，无法拉取云端数据，请刷新页面重试');
      } finally {
        showLoading(false);
      }
    }

    // 【核心函数2】同步数据到云端（所有数据修改后必须调用）
    async function saveGlobalData() {
      showLoading(true);
      try {
        const res = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(globalData)
        });
        const result = await res.json();
        if (result.code !== 200) {
          alert('数据同步失败：' + result.msg);
        }
      } catch (error) {
        console.error('同步数据错误', error);
        alert('网络错误，数据同步失败，请重试');
      } finally {
        showLoading(false);
      }
    }

    // 绑定所有页面事件
    function bindEvent() {
      // 登录相关
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('logoutBtn').addEventListener('click', logout);
      
      // tab切换
      const tabItems = document.querySelectorAll('.tab-item');
      tabItems.forEach(item => {
        item.addEventListener('click', function() {
          tabItems.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          const tabName = this.getAttribute('data-tab');
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          document.getElementById(tabName + 'Tab').classList.add('active');
        });
      });

      // 工单相关
      document.getElementById('addOrderBtn').addEventListener('click', showAddOrderModal);
      document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
      document.getElementById('confirmOrderBtn').addEventListener('click', saveOrder);

      // 导出相关
      document.getElementById('exportExcelBtn').addEventListener('click', exportExcel);

      // 回车登录
      document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
      });
    }

    // 登录函数（校验云端账号数据）
    async function login() {
      const role = document.getElementById('roleSelect').value;
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('请输入账号和密码');
        return;
      }

      // 从云端拉取的账号列表校验
      const user = globalData.userList.find(item => 
        item.username === username && item.password === password && item.role === role
      );

      if (!user) {
        alert('账号或密码错误，请重新输入');
        return;
      }

      // 登录成功
      currentLoginUser = user;
      document.getElementById('currentUser').innerText = username;
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('mainBox').style.display = 'block';
      
      // 登录后重新拉取最新云端数据，确保同步
      await loadGlobalData();
      // 渲染页面数据
      renderOrderTable();
      renderCheckTable();
    }

    // 退出登录
    function logout() {
      currentLoginUser = null;
      document.getElementById('mainBox').style.display = 'none';
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // 显示新增工单弹窗
    function showAddOrderModal() {
      editOrderId = null;
      document.getElementById('modalTitle').innerText = '新增派工单';
      document.getElementById('address').value = '';
      document.getElementById('content').value = '';
      document.getElementById('worker').value = '';
      document.getElementById('photoFile').value = '';
      document.getElementById('orderModal').style.display = 'flex';
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('orderModal').style.display = 'none';
      editOrderId = null;
    }

    // 保存工单（新增/编辑，同步到云端）
    async function saveOrder() {
      const address = document.getElementById('address').value.trim();
      const content = document.getElementById('content').value.trim();
      const worker = document.getElementById('worker').value.trim();

      if (!address || !content || !worker) {
        alert('请填写完整的工单信息');
        return;
      }

      // 生成工单编号
      const orderId = 'GD' + Date.now();
      const newOrder = {
        id: orderId,
        address: address,
        content: content,
        worker: worker,
        status: '待维修',
        createUser: currentLoginUser.username,
        createTime: new Date().toLocaleString('zh-CN'),
        photoList: []
      };

      // 新增工单到全局数据
      globalData.orderList.unshift(newOrder);
      
      // 同步到云端
      await saveGlobalData();
      
      // 重新渲染表格
      renderOrderTable();
      
      // 关闭弹窗
      closeModal();
      alert('工单创建成功，已同步到云端');
    }

    // 渲染工单表格
    function renderOrderTable() {
      const tbody = document.getElementById('orderTableBody');
      if (!globalData.orderList || globalData.orderList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">暂无工单数据</td></tr>';
        return;
      }

      let html = '';
      globalData.orderList.forEach(order => {
        html += `
          <tr>
            <td>${order.id}</td>
            <td>${order.address}</td>
            <td>${order.content}</td>
            <td>${order.worker}</td>
            <td>${order.status}</td>
            <td>${order.createTime}</td>
            <td>
              <button class="operate-btn edit-btn" data-id="${order.id}">编辑</button>
              <button class="operate-btn check-btn" data-id="${order.id}">审核</button>
              <button class="operate-btn delete-btn" data-id="${order.id}">删除</button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;

      // 绑定表格内操作按钮事件
      bindTableOperateEvent();
    }

    // 绑定表格操作事件
    function bindTableOperateEvent() {
      // 编辑按钮
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const orderId = this.getAttribute('data-id');
          alert('编辑功能可扩展，修改后会自动同步到云端');
        });
      });

      // 审核按钮
      document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          const orderId = this.getAttribute('data-id');
          const order = globalData.orderList.find(item => item.id === orderId);
          if (!order) return;
          
          order.status = '已审核';
          order.checkTime = new Date().toLocaleString('zh-CN');
          order.checkUser = currentLoginUser.username;
          
          // 新增到审核列表
          globalData.checkList.unshift({
            orderId: order.id,
            address: order.address,
            content: order.content,
            result: '验收合格',
            status: '已通过',
            createTime: new Date().toLocaleString('zh-CN'),
            checkUser: currentLoginUser.username
          });

          // 同步到云端
          await saveGlobalData();
          renderOrderTable();
          renderCheckTable();
          alert('审核完成，已同步到云端');
        });
      });

      // 删除按钮
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
          const orderId = this.getAttribute('data-id');
          if (!confirm('确定要删除该工单吗？删除后云端数据也会同步删除')) return;
          
          globalData.orderList = globalData.orderList.filter(item => item.id !== orderId);
          globalData.checkList = globalData.checkList.filter(item => item.orderId !== orderId);
          
          // 同步到云端
          await saveGlobalData();
          renderOrderTable();
          renderCheckTable();
          alert('删除成功，已同步到云端');
        });
      });
    }

    // 渲染审核表格
    function renderCheckTable() {
      const tbody = document.getElementById('checkTableBody');
      if (!globalData.checkList || globalData.checkList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">暂无审核数据</td></tr>';
        return;
      }

      let html = '';
      globalData.checkList.forEach(check => {
        html += `
          <tr>
            <td>${check.orderId}</td>
            <td>${check.address}</td>
            <td>${check.content}</td>
            <td>${check.result}</td>
            <td>${check.status}</td>
            <td>${check.createTime}</td>
            <td>
              <button class="operate-btn edit-btn" data-id="${check.orderId}">查看详情</button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    // 导出Excel功能（导出云端全量数据）
    function exportExcel() {
      if (!globalData.orderList || globalData.orderList.length === 0) {
        alert('暂无数据可导出');
        return;
      }

      // 导出CSV格式，兼容Excel
      let csvContent = '工单编号,报修地址,报修内容,维修人员,工单状态,创建时间,审核状态,审核人\n';
      globalData.orderList.forEach(order => {
        csvContent += `${order.id},${order.address},${order.content},${order.worker},${order.status},${order.createTime},${order.checkStatus || '未审核'},${order.checkUser || '-'}\n`;
      });

      // 生成文件下载
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `维修工单数据_${new Date().toLocaleDateString('zh-CN')}.csv`;
      link.click();
    }

    // 加载提示控制
    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }
  </script>
</body>
</html>
